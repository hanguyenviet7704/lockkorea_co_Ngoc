<div class="reset-password-page">
  <p-toast></p-toast>
  <div class="reset-password-container">
    <div class="reset-password-card">
      <div class="card-header">
        <h1 class="title">Đặt lại mật khẩu</h1>
        <p class="subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>
      </div>

      <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="reset-password-form">
        <div class="form-group">
          <label for="newPassword">Mật khẩu mới</label>
          <div class="password-field">
            <input 
              [type]="showNewPassword ? 'text' : 'password'"
              id="newPassword"
              formControlName="newPassword"
              placeholder="Nhập mật khẩu mới"
              class="form-input">
            <button 
              type="button"
              class="password-toggle"
              (click)="toggleNewPassword()">
              <i [class]="showNewPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
            </button>
          </div>
          <div *ngIf="resetPasswordForm.get('newPassword')?.invalid && (resetPasswordForm.get('newPassword')?.dirty || resetPasswordForm.get('newPassword')?.touched)" class="error-message">
            <small *ngIf="resetPasswordForm.get('newPassword')?.errors?.['required']">Vui lòng nhập mật khẩu mới.</small>
            <small *ngIf="resetPasswordForm.get('newPassword')?.errors?.['minlength']">Mật khẩu phải có ít nhất 6 ký tự.</small>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <div class="password-field">
            <input 
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              formControlName="confirmPassword"
              placeholder="Nhập lại mật khẩu mới"
              class="form-input">
            <button 
              type="button"
              class="password-toggle"
              (click)="toggleConfirmPassword()">
              <i [class]="showConfirmPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
            </button>
          </div>
          <div *ngIf="(resetPasswordForm.get('confirmPassword')?.invalid || resetPasswordForm.hasError('passwordMismatch')) && (resetPasswordForm.get('confirmPassword')?.dirty || resetPasswordForm.get('confirmPassword')?.touched)" class="error-message">
            <small *ngIf="resetPasswordForm.get('confirmPassword')?.errors?.['required']">Vui lòng xác nhận mật khẩu.</small>
            <small *ngIf="resetPasswordForm.hasError('passwordMismatch')">Mật khẩu xác nhận không khớp.</small>
          </div>
        </div>

        <div class="button-group">
          <button type="submit" class="submit-btn" [disabled]="resetPasswordForm.invalid || isLoading">
            <span *ngIf="!isLoading">Đặt lại mật khẩu</span>
            <span *ngIf="isLoading">Đang xử lý...</span>
          </button>
        </div>
      </form>

      <div class="back-login">
        <a routerLink="/auth-login" class="back-link">
          <i class="pi pi-arrow-left"></i>
          <span>Quay lại đăng nhập</span>
        </a>
      </div>
    </div>
  </div>
</div>
