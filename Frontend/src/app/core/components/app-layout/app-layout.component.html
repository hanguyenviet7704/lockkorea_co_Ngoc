<div class="layout-main">
  <div class="layout-header-section" [class.header-hidden]="isHeaderHidden">
    <app-header (sidebarToggled)="onSidebarToggle($event)"></app-header>
  </div>
  
  <div class="layout-main-content" [class.sidebar-open]="isSidebarOpen && (roleId === 2 || roleId === 3)" [class.sidebar-closed]="(!isSidebarOpen) && (roleId === 2 || roleId === 3)">
    <router-outlet></router-outlet>
  </div>
  <!-- Footer - Ẩn cho admin và staff -->
  @if(roleId !== 2 && roleId !== 3) {
    <div class="layout-footer">
      <app-footer></app-footer>
    </div>
  }
  <!-- KVK Intelligence - chỉ hiển thị cho user thông thường -->
  @if(roleId == 1 || roleId == 0) {
    <app-ai-chatbot></app-ai-chatbot>
  }
  <app-scroll-to-top></app-scroll-to-top>
  
  <!-- Mobile Bottom Navigation (Only for non-admin/staff) -->
  @if(roleId == 1 || roleId == 0) {
    <app-bottom-nav></app-bottom-nav>
  }
</div>
